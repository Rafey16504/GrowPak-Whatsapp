services:
  - type: web
    name: growpak-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL_ID
        sync: false
      - key: WHISPER_LANGUAGE
        value: ur
      - key: CHROMA_DB_PATH
        value: ./agriculture_chroma_db
      - key: COLLECTION_NAME
        value: agriculture_kb
      - key: SIMILARITY_THRESHOLD
        value: "0.55"
    disk:
      name: growpak-chroma
      mountPath: /opt/render/project/src/agriculture_chroma_db
      sizeGB: 1
